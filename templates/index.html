<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockCast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #09090b;
            --bg-surface: #111113;
            --bg-elevated: #18181b;
            --border: #27272a;
            --border-subtle: #1c1c20;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.06);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.06);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.06);
            --amber: rgba(245, 158, 11, 0.7);
            --cyan: rgba(6, 182, 212, 0.7);
            --purple: #a78bfa;
            --radius: 8px;
            --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'DM Mono', 'SF Mono', monospace;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Header ────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }

        .logo span { color: var(--green); }

        .search-form {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            width: 120px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--text-muted); }

        .search-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .search-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ── Loading ───────────────────────────────── */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            z-index: 100;
            overflow: hidden;
        }

        .loading-bar.active::after {
            content: '';
            display: block;
            width: 30%;
            height: 100%;
            background: var(--green);
            animation: sweep 1s ease-in-out infinite;
        }

        @keyframes sweep {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(430%); }
        }

        /* ── Main ──────────────────────────────────── */
        main { padding: 32px 0 64px; }

        /* ── Empty State ───────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 100px 0;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 28px;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestions button {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .suggestions button:hover {
            border-color: var(--green);
            color: var(--green);
        }

        /* ── Error ─────────────────────────────────── */
        .error-msg {
            background: var(--red-bg);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--red);
            font-size: 14px;
            padding: 12px 16px;
            border-radius: var(--radius);
            display: none;
            margin-bottom: 24px;
        }

        /* ── Watchlist ─────────────────────────────── */
        .watchlist {
            display: none;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .watchlist::-webkit-scrollbar { height: 3px; }
        .watchlist::-webkit-scrollbar-track { background: transparent; }
        .watchlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .wl-card {
            flex-shrink: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 10px 14px;
            min-width: 110px;
            cursor: pointer;
            position: relative;
            transition: border-color 0.15s, background 0.15s;
        }

        .wl-card.active {
            border-color: var(--green);
            background: var(--green-bg);
        }

        .wl-card:hover:not(.active) { border-color: var(--border); }

        .wl-symbol {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .wl-price {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            margin-bottom: 2px;
        }

        .wl-change {
            font-family: var(--font-mono);
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }

        .wl-actions {
            position: absolute;
            top: 4px;
            right: 6px;
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .wl-card:hover .wl-actions { opacity: 1; }

        .wl-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            transition: color 0.15s;
        }

        .wl-actions .wl-refresh:hover { color: var(--blue); }
        .wl-actions .wl-remove:hover { color: var(--red); }

        /* ── Dashboard ─────────────────────────────── */
        .dashboard { display: none; }

        .dashboard.visible {
            display: block;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .symbol-header { margin-bottom: 20px; }

        .symbol-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        /* ── Stats ─────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 16px 18px;
        }

        .stat-card.highlight {
            border-left: 2px solid var(--blue);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }

        .stat-sub {
            font-family: var(--font-mono);
            font-size: 12px;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }

        .positive { color: var(--green); }
        .negative { color: var(--red); }

        /* ── Chart ─────────────────────────────────── */
        .chart-wrapper {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .chart-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px 0;
        }

        .chart-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .chart-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .chart-legend span {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chart-legend .dot {
            width: 8px;
            height: 2px;
            border-radius: 1px;
            display: inline-block;
        }

        .dot.ohlc { background: var(--green); }
        .dot.sma5 { background: var(--amber); }
        .dot.sma20 { background: var(--cyan); }
        .dot.forecast { background: var(--blue); }

        #chart {
            width: 100%;
            height: 400px;
        }

        .rsi-divider {
            padding: 8px 18px 0;
            border-top: 1px solid var(--border-subtle);
        }

        #rsiChart {
            width: 100%;
            height: 100px;
        }

        /* ── Responsive ────────────────────────────── */
        @media (max-width: 700px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; gap: 16px; }
            #chart { height: 300px; }
            #rsiChart { height: 80px; }
            .empty-state { padding: 60px 0; }
        }

        @media (max-width: 400px) {
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="loading-bar" id="loadingBar"></div>

    <div class="app">
        <header>
            <div class="logo">stock<span>cast</span></div>
            <form class="search-form" onsubmit="return handleSearch(event)">
                <input
                    type="text"
                    class="search-input"
                    id="symbolInput"
                    placeholder="Ticker..."
                    maxlength="10"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                >
                <button type="submit" class="search-btn">Search</button>
            </form>
        </header>

        <main>
            <div id="emptyState" class="empty-state">
                <p>Enter a ticker symbol to view price data and ML predictions</p>
                <div class="suggestions">
                    <button type="button" onclick="search('AAPL')">AAPL</button>
                    <button type="button" onclick="search('MSFT')">MSFT</button>
                    <button type="button" onclick="search('GOOGL')">GOOGL</button>
                    <button type="button" onclick="search('AMZN')">AMZN</button>
                    <button type="button" onclick="search('TSLA')">TSLA</button>
                </div>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <div id="watchlist" class="watchlist"></div>

            <div id="dashboard" class="dashboard">
                <div class="symbol-header">
                    <h1 id="symbolTitle"></h1>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Price</div>
                        <div class="stat-value" id="statPrice"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Change</div>
                        <div class="stat-value" id="statChange"></div>
                        <div class="stat-sub" id="statChangePct"></div>
                    </div>
                    <div class="stat-card highlight">
                        <div class="stat-label">ML Prediction</div>
                        <div class="stat-value" id="statPred"></div>
                        <div class="stat-sub" id="statPredRange"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Model Accuracy</div>
                        <div class="stat-value" id="statMAE"></div>
                        <div class="stat-sub" id="statDirection"></div>
                    </div>
                </div>

                <div class="chart-wrapper">
                    <div class="chart-toolbar">
                        <span class="chart-title">Price History</span>
                        <div class="chart-legend">
                            <span><span class="dot ohlc"></span>OHLC</span>
                            <span><span class="dot sma5"></span>SMA 5</span>
                            <span><span class="dot sma20"></span>SMA 20</span>
                            <span><span class="dot forecast"></span>Forecast</span>
                        </div>
                    </div>
                    <div id="chart"></div>
                    <div class="rsi-divider">
                        <span class="chart-title">RSI (14)</span>
                    </div>
                    <div id="rsiChart"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /* ── State ── */
        const state = { tickers: new Map(), selected: null };
        let mainChart = null;
        let rsiChart = null;
        let ro = null;
        let pending = 0;

        /* ── Search / Routing ── */
        function handleSearch(e) {
            e.preventDefault();
            const sym = document.getElementById('symbolInput').value.trim().toUpperCase();
            if (sym) search(sym);
        }

        function search(symbol, opts) {
            const autoSelect = opts && opts.autoSelect === false ? false : true;
            document.getElementById('symbolInput').value = symbol;

            if (state.tickers.has(symbol)) {
                if (autoSelect) selectTicker(symbol);
                return;
            }

            const loading = document.getElementById('loadingBar');
            const error   = document.getElementById('errorMsg');

            pending++;
            loading.classList.add('active');
            error.style.display = 'none';

            fetch('/api/stock/' + symbol)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    pending--;
                    if (!pending) loading.classList.remove('active');

                    if (data.error) {
                        error.textContent = data.error;
                        error.style.display = 'block';
                        return;
                    }

                    state.tickers.set(symbol, data);
                    saveWatchlist();

                    if (autoSelect || !state.selected) {
                        selectTicker(symbol);
                    } else {
                        renderWatchlist();
                    }
                })
                .catch(function() {
                    pending--;
                    if (!pending) loading.classList.remove('active');
                    error.textContent = 'Request failed. Check your connection and try again.';
                    error.style.display = 'block';
                });
        }

        function selectTicker(symbol) {
            state.selected = symbol;
            var data = state.tickers.get(symbol);

            document.getElementById('emptyState').style.display = 'none';
            document.title = symbol + ' — StockCast';

            var dash = document.getElementById('dashboard');
            if (!dash.classList.contains('visible')) {
                dash.classList.add('visible');
            }

            renderWatchlist();
            renderStats(data);
            renderChart(data);
        }

        function removeTicker(symbol) {
            state.tickers.delete(symbol);
            saveWatchlist();

            if (state.selected === symbol) {
                var keys = Array.from(state.tickers.keys());
                if (keys.length) {
                    selectTicker(keys[keys.length - 1]);
                    return;
                }
                state.selected = null;
                document.getElementById('dashboard').classList.remove('visible');
                document.getElementById('watchlist').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                document.title = 'StockCast';
                return;
            }
            renderWatchlist();
        }

        function refreshTicker(symbol) {
            var wasSelected = state.selected === symbol;

            pending++;
            document.getElementById('loadingBar').classList.add('active');

            fetch('/api/stock/' + symbol + '?refresh=1')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    pending--;
                    if (!pending) document.getElementById('loadingBar').classList.remove('active');

                    if (data.error) {
                        document.getElementById('errorMsg').textContent = data.error;
                        document.getElementById('errorMsg').style.display = 'block';
                        return;
                    }

                    state.tickers.set(symbol, data);
                    if (wasSelected) selectTicker(symbol);
                    else renderWatchlist();
                })
                .catch(function() {
                    pending--;
                    if (!pending) document.getElementById('loadingBar').classList.remove('active');
                });
        }

        /* ── Persistence ── */
        function saveWatchlist() {
            localStorage.setItem('stockcast_watchlist', JSON.stringify(Array.from(state.tickers.keys())));
        }

        function loadWatchlist() {
            try {
                var saved = localStorage.getItem('stockcast_watchlist');
                if (!saved) return;
                var symbols = JSON.parse(saved);
                if (symbols && symbols.length) {
                    symbols.forEach(function(sym) { search(sym, { autoSelect: false }); });
                }
            } catch (e) { /* ignore corrupt data */ }
        }

        /* ── Watchlist ── */
        function renderWatchlist() {
            var wl = document.getElementById('watchlist');
            if (!state.tickers.size) { wl.style.display = 'none'; return; }

            wl.style.display = 'flex';
            wl.innerHTML = '';

            state.tickers.forEach(function(d, sym) {
                var active = sym === state.selected;
                var up     = d.change >= 0;
                var sign   = up ? '+' : '';
                var cls    = up ? 'positive' : 'negative';

                var card = document.createElement('div');
                card.className = 'wl-card' + (active ? ' active' : '');
                card.onclick = function() { selectTicker(sym); };
                card.innerHTML =
                    '<div class="wl-actions">' +
                        '<button class="wl-refresh" onclick="event.stopPropagation(); refreshTicker(\'' + sym + '\')" title="Refresh">&#8635;</button>' +
                        '<button class="wl-remove" onclick="event.stopPropagation(); removeTicker(\'' + sym + '\')" title="Remove">&times;</button>' +
                    '</div>' +
                    '<div class="wl-symbol">' + sym + '</div>' +
                    '<div class="wl-price">' + fmt(d.current_price) + '</div>' +
                    '<div class="wl-change ' + cls + '">' + sign + d.change_percent.toFixed(2) + '%</div>';
                wl.appendChild(card);
            });
        }

        /* ── Stats ── */
        function renderStats(data) {
            document.getElementById('symbolTitle').textContent = data.symbol;
            document.getElementById('statPrice').textContent = fmt(data.current_price);
            document.getElementById('statPrice').className = 'stat-value';

            var up   = data.change >= 0;
            var sign = up ? '+' : '';
            var cls  = up ? 'positive' : 'negative';

            setEl('statChange', sign + fmt(data.change), 'stat-value ' + cls);
            setEl('statChangePct', sign + data.change_percent.toFixed(2) + '%', 'stat-sub ' + cls);

            var predDelta = data.prediction - data.current_price;
            var predCls   = predDelta >= 0 ? 'positive' : 'negative';

            setEl('statPred', fmt(data.prediction), 'stat-value ' + predCls);
            setEl('statPredRange', fmt(data.prediction_low) + ' – ' + fmt(data.prediction_high), 'stat-sub');

            if (data.mae_percent != null) {
                setEl('statMAE', '±' + data.mae_percent + '%', 'stat-value');
            } else {
                setEl('statMAE', '—', 'stat-value');
            }

            if (data.direction_accuracy != null) {
                setEl('statDirection', data.direction_accuracy + '% directional', 'stat-sub');
            } else {
                setEl('statDirection', '', 'stat-sub');
            }
        }

        /* ── Chart ── */
        function renderChart(data) {
            var container    = document.getElementById('chart');
            var rsiContainer = document.getElementById('rsiChart');

            if (ro) { ro.disconnect(); ro = null; }
            if (mainChart) { mainChart.remove(); mainChart = null; }
            if (rsiChart) { rsiChart.remove(); rsiChart = null; }

            var theme = {
                layout: {
                    backgroundColor: '#111113',
                    textColor: '#52525b',
                    fontFamily: "'DM Sans', system-ui, sans-serif",
                    fontSize: 11,
                },
                grid: {
                    vertLines: { color: '#1c1c20' },
                    horzLines: { color: '#1c1c20' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: { color: 'rgba(82,82,91,0.25)', labelBackgroundColor: '#27272a' },
                    horzLine: { color: 'rgba(82,82,91,0.25)', labelBackgroundColor: '#27272a' },
                },
                rightPriceScale: { borderColor: '#1c1c20' },
            };

            /* ── Main price chart ── */
            mainChart = LightweightCharts.createChart(container, Object.assign({}, theme, {
                width: container.clientWidth,
                height: container.clientHeight,
                timeScale: { borderColor: '#1c1c20', rightOffset: 6 },
            }));

            var candles = mainChart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderUpColor: '#10b981',
                borderDownColor: '#ef4444',
                wickUpColor: 'rgba(16,185,129,0.5)',
                wickDownColor: 'rgba(239,68,68,0.5)',
            });

            candles.setData(data.history.map(function(d) {
                return { time: d.date, open: d.open, high: d.high, low: d.low, close: d.close };
            }));

            /* SMA overlays */
            if (data.indicators) {
                if (data.indicators.sma_5 && data.indicators.sma_5.length) {
                    var sma5 = mainChart.addLineSeries({
                        color: 'rgba(245,158,11,0.6)',
                        lineWidth: 1,
                        lastValueVisible: false,
                        priceLineVisible: false,
                    });
                    sma5.setData(data.indicators.sma_5);
                }

                if (data.indicators.sma_20 && data.indicators.sma_20.length) {
                    var sma20 = mainChart.addLineSeries({
                        color: 'rgba(6,182,212,0.6)',
                        lineWidth: 1,
                        lastValueVisible: false,
                        priceLineVisible: false,
                    });
                    sma20.setData(data.indicators.sma_20);
                }
            }

            /* Forecast line + bounds */
            if (data.forecast && data.forecast.length) {
                var lastPt = data.history[data.history.length - 1];

                var fLine = mainChart.addLineSeries({
                    color: '#3b82f6',
                    lineWidth: 2,
                    lineStyle: 2,
                    lastValueVisible: true,
                    priceLineVisible: false,
                });
                fLine.setData(
                    [{ time: lastPt.date, value: lastPt.close }].concat(
                        data.forecast.map(function(f) { return { time: f.date, value: f.price }; })
                    )
                );

                var fHigh = mainChart.addLineSeries({
                    color: 'rgba(59,130,246,0.15)',
                    lineWidth: 1,
                    lineStyle: 1,
                    lastValueVisible: false,
                    priceLineVisible: false,
                    crosshairMarkerVisible: false,
                });
                fHigh.setData(
                    [{ time: lastPt.date, value: lastPt.close }].concat(
                        data.forecast.map(function(f) { return { time: f.date, value: f.high }; })
                    )
                );

                var fLow = mainChart.addLineSeries({
                    color: 'rgba(59,130,246,0.15)',
                    lineWidth: 1,
                    lineStyle: 1,
                    lastValueVisible: false,
                    priceLineVisible: false,
                    crosshairMarkerVisible: false,
                });
                fLow.setData(
                    [{ time: lastPt.date, value: lastPt.close }].concat(
                        data.forecast.map(function(f) { return { time: f.date, value: f.low }; })
                    )
                );
            }

            /* Volume */
            var volume = mainChart.addHistogramSeries({
                priceFormat: { type: 'volume' },
                priceScaleId: '',
            });
            volume.priceScale().applyOptions({
                scaleMargins: { top: 0.82, bottom: 0 },
            });
            volume.setData(data.history.map(function(d) {
                return {
                    time: d.date,
                    value: d.volume,
                    color: d.close >= d.open ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.12)',
                };
            }));

            mainChart.timeScale().fitContent();

            /* ── RSI sub-chart ── */
            rsiChart = LightweightCharts.createChart(rsiContainer, Object.assign({}, theme, {
                width: rsiContainer.clientWidth,
                height: rsiContainer.clientHeight,
                timeScale: { visible: false, borderColor: 'transparent' },
                rightPriceScale: {
                    borderColor: '#1c1c20',
                    scaleMargins: { top: 0.08, bottom: 0.08 },
                },
            }));

            if (data.indicators && data.indicators.rsi && data.indicators.rsi.length) {
                var rsiSeries = rsiChart.addLineSeries({
                    color: '#a78bfa',
                    lineWidth: 1.5,
                    priceLineVisible: false,
                    lastValueVisible: true,
                });
                rsiSeries.setData(data.indicators.rsi);

                rsiSeries.createPriceLine({
                    price: 70,
                    color: 'rgba(239,68,68,0.2)',
                    lineWidth: 1,
                    lineStyle: 1,
                    axisLabelVisible: true,
                    title: '',
                });
                rsiSeries.createPriceLine({
                    price: 30,
                    color: 'rgba(16,185,129,0.2)',
                    lineWidth: 1,
                    lineStyle: 1,
                    axisLabelVisible: true,
                    title: '',
                });
            }

            rsiChart.timeScale().fitContent();

            /* Sync time scales */
            var syncing = false;
            mainChart.timeScale().subscribeVisibleLogicalRange(function(range) {
                if (syncing || !range) return;
                syncing = true;
                rsiChart.timeScale().setVisibleLogicalRange(range);
                syncing = false;
            });
            rsiChart.timeScale().subscribeVisibleLogicalRange(function(range) {
                if (syncing || !range) return;
                syncing = true;
                mainChart.timeScale().setVisibleLogicalRange(range);
                syncing = false;
            });

            /* Sync initial view after fitContent settles */
            setTimeout(function() {
                var range = mainChart.timeScale().getVisibleLogicalRange();
                if (range && rsiChart) {
                    rsiChart.timeScale().setVisibleLogicalRange(range);
                }
            }, 0);

            /* Resize observer */
            ro = new ResizeObserver(function() {
                var w = container.clientWidth;
                if (mainChart) mainChart.applyOptions({ width: w });
                if (rsiChart) rsiChart.applyOptions({ width: w });
            });
            ro.observe(container.closest('.chart-wrapper'));
        }

        /* ── Helpers ── */
        function fmt(n) { return '$' + n.toFixed(2); }

        function setEl(id, text, className) {
            var el = document.getElementById(id);
            el.textContent = text;
            el.className = className;
        }

        /* ── Init ── */
        loadWatchlist();
    </script>
</body>
</html>
